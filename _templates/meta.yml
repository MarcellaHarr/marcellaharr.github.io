# meta.yml — Fill this in before running build.py
# Copy this file into your _projects/<project-name>/ folder

title: Your Project Title
date: January 1, 2024
category: Python · Data Analysis
description: One sentence describing what this project is about.
github_url: https://github.com/MarcellaHarr/your-repo-name

# Which repo landing page should get a card for this project?
# One of: r-studio.html, excel.html, web-dev.html, sql-repo.html, jupyter.html,
# follow-along.html
repo_page: sql-repo.html

# Filename of an image already in this project's folder to use as the card
# thumbnail (build.py copies it to assets/img/<project-name>/ for you).
# Leave blank/remove this line to fall back to a generic placeholder image.
thumbnail: your-image.jpg

# List the resources, datasets, or tools you referenced.
# These appear in the "Resources used" panel on the right side of the page.
# Add or remove entries as needed.
resources:
  - title: Resource or dataset name
    url: https://example.com
    date: January 15, 2024
  - title: Another resource
    url: https://example.com
    date: January 14, 2024
  - title: Third resource
    url: https://example.com
    date: January 13, 2024
